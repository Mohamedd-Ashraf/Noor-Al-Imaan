name: qcf_quran
description: Local fork of qcf_quran – page fonts loaded dynamically at runtime.
version: 0.0.5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  assets:
    - assets/mainframe.png
    - assets/mainpagenum.png
    - assets/mainpagenum_no.png
    - assets/fonts/arsura.ttf
    - assets/fonts/surah-name-v2.woff
    - assets/fonts/versenumbers-Regular.otf
    - assets/fonts/QCF2BSMLfonts/QCF4_QBSML-Regular.woff

  # Only the small non-page fonts are bundled.
  # The 604 QCF page fonts (QCF4001..QCF4604) are downloaded at runtime.
  fonts:
    - family: QCFSurahName
      fonts:
        - asset: assets/fonts/surah-name-v2.woff

    - family: QCFVerse
      fonts:
        - asset: assets/fonts/versenumbers-Regular.otf

    - family: ArsuraSurahName
      fonts:
        - asset: assets/fonts/arsura.ttf

    - family: QCF_BSML
      fonts:
        - asset: assets/fonts/QCF2BSMLfonts/QCF4_QBSML-Regular.woff
